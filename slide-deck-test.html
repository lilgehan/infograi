<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infogr.ai — Slide Deck Verification Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #2563EB;
    --accent-soft: rgba(37,99,235,0.10);
    --accent-rgb: 37,99,235;
    --card-bg: #ffffff;
    --card-border: #e5e7eb;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --font-heading: 'Space Grotesk', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #f3f4f6;
    color: #111827;
    padding: 24px;
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    margin-bottom: 6px;
    text-align: center;
  }
  .subtitle {
    text-align: center;
    color: #6b7280;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .test-controls {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .test-btn {
    padding: 6px 14px;
    border: 1px solid #d1d5db;
    border-radius: 16px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
  }
  .test-btn.on { background: #2563EB; color: #fff; border-color: #2563EB; }

  .checks {
    max-width: 720px;
    margin: 0 auto 24px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 16px 20px;
  }
  .checks h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    margin-bottom: 8px;
  }
  .check {
    font-family: monospace;
    font-size: 12px;
    margin: 4px 0;
    padding: 6px 10px;
    border-radius: 4px;
    background: #fafafa;
  }
  .check.ok    { background: #dcfce7; color: #15803d; }
  .check.fail  { background: #fee2e2; color: #b91c1c; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
    gap: 20px;
  }
  .slide-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
  }
  .slide-card-header {
    padding: 10px 14px;
    border-bottom: 1px solid #f3f4f6;
    background: #fafafa;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
  }
  .slide-card-id {
    color: #2563EB;
    margin-right: 8px;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .slide-card-body {
    padding: 12px;
    background: #f9fafb;
    height: 250px;
    overflow: hidden;
    position: relative;
  }
  .slide-card-inner {
    position: absolute;
    top: 12px;
    left: 12px;
    width: 960px;
    height: 540px;
    transform: scale(0.42);
    transform-origin: top left;
  }

  .thumb-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 12px;
    background: #F5F6F8;
    border-radius: 8px;
    margin-bottom: 24px;
  }
  .thumb-cell {
    width: 120px;
    height: 67.5px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid transparent;
    border-radius: 4px;
    background: #fff;
  }
  .thumb-cell.is-active { border-color: #2563EB; }
  .thumb-cell-inner {
    position: absolute;
    top: 0;
    left: 0;
    width: 960px;
    height: 540px;
    transform: scale(0.125);
    transform-origin: top left;
  }
</style>
</head>
<body>
  <h1>Slide Deck Phase 1+2 — Verification</h1>
  <p class="subtitle">Exercises slide-deck.js, slide-templates.js, slide-renderer.js end-to-end.</p>

  <div class="test-controls">
    <span style="font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;align-self:center;">Tone:</span>
    <button class="test-btn on" data-tone="professional">Professional</button>
    <button class="test-btn"    data-tone="bold">Bold</button>
    <button class="test-btn"    data-tone="minimal">Minimal</button>
    <button class="test-btn"    data-tone="playful">Playful</button>
  </div>

  <div class="checks" id="checksBox">
    <h3>Sanity checks</h3>
    <div id="checks"></div>
  </div>

  <h3 style="text-align:center;font-family:'Space Grotesk',sans-serif;font-size:15px;margin-bottom:12px;">
    Thumbnail panel preview (scale 0.125 = 120 / 960)
  </h3>
  <div class="thumb-strip" id="thumbStrip"></div>

  <h3 style="text-align:center;font-family:'Space Grotesk',sans-serif;font-size:15px;margin-bottom:12px;">
    Sample slides — one per template category, plus stress tests
  </h3>
  <div class="grid" id="slideGrid"></div>

<script type="module">
  import {
    createDeck, addSlide, addBlock, withSlide, getSlide,
    duplicateSlide, removeSlide, changeSlideTemplate, blocksInZone,
  } from './v3/slide-deck.js';
  import {
    TEMPLATES, getTemplateZones, renderSlideTemplate,
  } from './v3/slide-templates.js';
  import {
    renderSlide, DECK_MODE_CSS,
  } from './v3/slide-renderer.js';

  // Inject all deck-mode CSS so slides render correctly inside the test page
  const styleEl = document.createElement('style');
  styleEl.textContent = DECK_MODE_CSS;
  document.head.appendChild(styleEl);

  /* ───────── Sanity checks ───────── */
  const checks = [];
  function check(name, fn) {
    let ok = false, err = '';
    try { ok = !!fn(); } catch (e) { err = e.message; }
    checks.push({ name, ok, err });
  }

  // Data model checks
  let deck = createDeck('Verification Deck', 'professional', '#2563EB');
  check('createDeck returns object with id, slides[]', () => deck.id && Array.isArray(deck.slides));
  deck = addSlide(deck, 'A2', null, { title: 'Sample Title', subtitle: 'A subtitle' });
  deck = addSlide(deck, 'A1', deck.slides[0].id);
  deck = addSlide(deck, 'B1', deck.slides[1].id);
  check('addSlide appends and inserts correctly', () => deck.slides.length === 3 && deck.slides[2].templateId === 'B1');

  const blankSlide = deck.slides[1];
  let updated = withSlide(deck, blankSlide.id, s => addBlock(s, {
    type: 'diagram', family: 'boxes', variant: 'solid-boxes',
    items: [
      { title: 'Alpha', body: 'First.' },
      { title: 'Beta',  body: 'Second.' },
      { title: 'Gamma', body: 'Third.' },
    ],
    columns: 3,
    position: { zone: 'content' },
  }));
  check('addBlock places block in zone "content"', () =>
    blocksInZone(getSlide(updated, blankSlide.id), 'content').length === 1);

  const dup = duplicateSlide(updated, blankSlide.id);
  check('duplicateSlide adds new slide with same blocks count', () =>
    dup.slides.length === 4 &&
    blocksInZone(dup.slides[2], 'content').length === 1 &&
    dup.slides[2].id !== dup.slides[1].id);

  const reduced = removeSlide(dup, dup.slides[3].id);
  check('removeSlide drops one slide', () => reduced.slides.length === 3);

  // Fixed-slot constraint via changeSlideTemplate
  const tplChanged = changeSlideTemplate(updated, blankSlide.id, 'B2', getTemplateZones);
  const movedBlocks = blocksInZone(tplChanged.slides[1], 'content');
  check('changeSlideTemplate B1 → B2 keeps blocks in remapped content zone', () =>
    tplChanged.slides[1].templateId === 'B2' && movedBlocks.length === 1);

  // Template registry
  check('TEMPLATES has 26 entries (4+6+6+4+6)', () => Object.keys(TEMPLATES).length === 26);
  const cats = ['A', 'B', 'C', 'D', 'E'];
  for (const c of cats) {
    const expected = { A: 4, B: 6, C: 6, D: 4, E: 6 }[c];
    check(`Category ${c} has ${expected} templates`, () =>
      Object.values(TEMPLATES).filter(t => t.category === c).length === expected);
  }

  // Render checks
  const sampleHtml = renderSlide(updated.slides[1], 'professional', '#2563EB');
  check('renderSlide returns a fragment with .igs-slide root', () =>
    typeof sampleHtml === 'string' && sampleHtml.includes('class="igs-slide"'));
  check('renderSlide includes wrapped .ig-page for diagrams', () =>
    sampleHtml.includes('class="ig-page"'));
  check('renderSlide produces SVG/HTML for the boxes diagram', () =>
    sampleHtml.includes('igs-card') || sampleHtml.includes('Alpha'));

  // Template skeleton check
  const a1Html = renderSlideTemplate('A1');
  check('renderSlideTemplate("A1") returns single content zone', () =>
    a1Html.includes('data-template="A1"') && (a1Html.match(/data-zone-type="content"/g) || []).length === 1);
  const b1Html = renderSlideTemplate('B1');
  check('renderSlideTemplate("B1") includes accent + content zones', () =>
    b1Html.includes('data-zone-type="accent"') && b1Html.includes('data-zone-type="content"'));

  // Pointer-events guard: content zones must be interactive
  // (Phase 3 cursor system depends on this.)
  const tmp = document.createElement('div');
  tmp.innerHTML = renderSlide(updated.slides[1], 'professional', '#2563EB');
  document.body.appendChild(tmp);
  const zone = tmp.querySelector('.igs-zone-content');
  let pe = '';
  if (zone) pe = getComputedStyle(zone).pointerEvents;
  document.body.removeChild(tmp);
  check('Content zones are NOT pointer-events:none (cursor system safe)', () => pe !== 'none');

  /* ───────── Render the checks ───────── */
  const checksDiv = document.getElementById('checks');
  for (const c of checks) {
    const el = document.createElement('div');
    el.className = 'check ' + (c.ok ? 'ok' : 'fail');
    el.textContent = (c.ok ? '✓ ' : '✗ ') + c.name + (c.err ? ' — ' + c.err : '');
    checksDiv.appendChild(el);
  }

  /* ───────── Render the deck visually ───────── */

  // Build a richer demo deck — one slide per template category plus stress tests
  let demoDeck = createDeck('Demo Deck', 'professional', '#2563EB');

  function add(tplId, opts = {}) {
    demoDeck = addSlide(demoDeck, tplId, demoDeck.slides[demoDeck.slides.length - 1]?.id || null,
      { title: opts.title || '', subtitle: opts.subtitle || '' });
    return demoDeck.slides[demoDeck.slides.length - 1];
  }
  function addBoxesBlock(slide, n = 3, zoneName = 'content') {
    const items = Array.from({ length: n }, (_, i) => ({
      title: `Item ${i + 1}`,
      body:  `Brief description of item ${i + 1}.`,
      icon:  ['target','rocket','star','idea','shield','gear'][i % 6],
    }));
    demoDeck = withSlide(demoDeck, slide.id, s => addBlock(s, {
      type: 'diagram', family: 'boxes', variant: 'solid-boxes-icons',
      items, columns: Math.min(n, 3), density: 'standard',
      position: { zone: zoneName },
    }));
  }
  function addDiagramBlock(slide, variant, family, items, zoneName = 'content', columns = 3) {
    demoDeck = withSlide(demoDeck, slide.id, s => addBlock(s, {
      type: 'diagram', family, variant, items, columns, density: 'standard',
      position: { zone: zoneName },
    }));
  }

  // Sample slides
  add('A2', { title: 'Demo Deck', subtitle: 'Phase 1 + 2 verification' });
  const s_a1 = add('A1');
  addBoxesBlock(s_a1, 4);

  const s_b1 = add('B1');
  addBoxesBlock(s_b1, 3);

  const s_c1 = add('C1');
  addBoxesBlock(s_c1, 2, 'left');
  addDiagramBlock(s_c1, 'stats', 'numbers', [
    { title: '90%', body: 'Coverage' },
    { title: '$1.6M', body: 'Saved' },
  ], 'right', 2);

  const s_c4 = add('C4');
  for (const z of ['col1', 'col2', 'col3']) {
    addDiagramBlock(s_c4, 'stats', 'numbers', [
      { title: ['25%','50%','75%'][['col1','col2','col3'].indexOf(z)], body: 'Metric' },
    ], z, 1);
  }

  const s_d1 = add('D1', { title: 'Mixed Image + Two Columns' });
  addBoxesBlock(s_d1, 2, 'col1');
  addBoxesBlock(s_d1, 2, 'col2');

  add('E1', { title: 'A great quote captures the point in one line.', subtitle: '— Source / Author' });
  add('E2', { title: '90%', subtitle: 'Quote-to-cash cycle reduction' });
  add('E6', { title: 'Ready to transform operations?', subtitle: 'Schedule a discovery call.' });

  // Stress test: 3 stacked diagrams in one zone (max per spec Section 4 Rule 4)
  const s_stress = add('A1', { title: 'Stress: 3 stacked diagrams' });
  for (let i = 0; i < 3; i++) addBoxesBlock(s_stress, 3);

  /* ── Render the thumbnail strip ── */
  const thumbStrip = document.getElementById('thumbStrip');
  demoDeck.slides.forEach((s, i) => {
    const cell = document.createElement('div');
    cell.className = 'thumb-cell' + (i === 0 ? ' is-active' : '');
    cell.innerHTML = `<div class="thumb-cell-inner">${renderSlide(s, demoDeck.theme, demoDeck.accentColor)}</div>`;
    thumbStrip.appendChild(cell);
  });

  /* ── Render the slide grid ── */
  const grid = document.getElementById('slideGrid');
  function renderGrid() {
    grid.innerHTML = '';
    demoDeck.slides.forEach(s => {
      const card = document.createElement('div');
      card.className = 'slide-card';
      card.innerHTML = `
        <div class="slide-card-header">
          <span class="slide-card-id">${s.templateId}</span>
          ${TEMPLATES[s.templateId]?.name || ''}
        </div>
        <div class="slide-card-body">
          <div class="slide-card-inner">${renderSlide(s, demoDeck.theme, demoDeck.accentColor)}</div>
        </div>
      `;
      grid.appendChild(card);
    });
  }
  renderGrid();

  /* ── Tone switcher ── */
  document.querySelectorAll('.test-btn[data-tone]').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.test-btn[data-tone]').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      const toneAccents = {
        professional: '#2563EB',
        bold:         '#F59E0B',
        minimal:      '#0F766E',
        playful:      '#7C3AED',
      };
      const accent = toneAccents[b.dataset.tone] || '#2563EB';
      const r = parseInt(accent.slice(1,3), 16);
      const g = parseInt(accent.slice(3,5), 16);
      const bl = parseInt(accent.slice(5,7), 16);
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-soft', `rgba(${r},${g},${bl},0.10)`);
      document.documentElement.style.setProperty('--accent-rgb', `${r},${g},${bl}`);
      demoDeck = { ...demoDeck, theme: b.dataset.tone, accentColor: accent };
      renderGrid();
      // Re-render thumbnails too
      thumbStrip.innerHTML = '';
      demoDeck.slides.forEach((s, i) => {
        const cell = document.createElement('div');
        cell.className = 'thumb-cell' + (i === 0 ? ' is-active' : '');
        cell.innerHTML = `<div class="thumb-cell-inner">${renderSlide(s, demoDeck.theme, demoDeck.accentColor)}</div>`;
        thumbStrip.appendChild(cell);
      });
    });
  });
</script>
</body>
</html>
