<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <!-- Card 1 -->
  <rect x="8" y="8" width="244" height="144" rx="8" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="1"/>
  <g id="icon_card1" transform="translate(20,20)">
    <rect width="36" height="36" rx="9" fill="#E6F0FF"/>
    <text x="18" y="25" text-anchor="middle" font-size="18" fill="#2563EB">⊞</text>
  </g>
  <text id="slot_card1_title" x="20" y="78" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Card One Title</text>
  <text id="slot_card1_b1" x="20" y="98" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#555">• Point one detail</text>
  <text id="slot_card1_b2" x="20" y="114" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#555">• Point two detail</text>
  <text id="slot_card1_b3" x="20" y="130" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#555">• Point three detail</text>
  <!-- Card 2 -->
  <rect x="278" y="8" width="244" height="144" rx="8" fill="#1A2744"/>
  <g id="icon_card2" transform="translate(290,20)">
    <rect width="36" height="36" rx="9" fill="#E05A2B" opacity="0.3"/>
    <text x="18" y="25" text-anchor="middle" font-size="18" fill="#E05A2B">◎</text>
  </g>
  <text id="slot_card2_title" x="290" y="78" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Card Two Title</text>
  <text id="slot_card2_b1" x="290" y="98" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#AAAACC">• Point one detail</text>
  <text id="slot_card2_b2" x="290" y="114" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#AAAACC">• Point two detail</text>
  <text id="slot_card2_b3" x="290" y="130" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#AAAACC">• Point three detail</text>
  <!-- Card 3 -->
  <rect x="548" y="8" width="244" height="144" rx="8" fill="#FFFFFF" stroke="#EEEEEE" stroke-width="1"/>
  <g id="icon_card3" transform="translate(560,20)">
    <rect width="36" height="36" rx="9" fill="#DCFCE7"/>
    <text x="18" y="25" text-anchor="middle" font-size="18" fill="#16A34A">✓</text>
  </g>
  <text id="slot_card3_title" x="560" y="78" font-family="'Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" fill="#1A1A1A">Card Three Title</text>
  <text id="slot_card3_b1" x="560" y="98" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#555">• Point one detail</text>
  <text id="slot_card3_b2" x="560" y="114" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#555">• Point two detail</text>
  <text id="slot_card3_b3" x="560" y="130" font-family="'Helvetica Neue',Arial,sans-serif" font-size="11" fill="#555">• Point three detail</text>
</svg>
