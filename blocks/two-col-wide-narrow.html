<section class="ig-block ig-two-col-wide-narrow" data-block-id="two-col-wide-narrow">
  <div class="ig-wide">
    <div class="ig-wide-head">
      <span data-asset-slot data-asset-type="icon"></span>
      <span data-slot="wide_title" data-editable="true" contenteditable="true"></span>
    </div>
    <div class="ig-wide-body">
      <ul data-slot="wide_bullets"></ul>
      <div class="ig-wide-note" data-slot="wide_note" data-editable="true" contenteditable="true"></div>
    </div>
  </div>
  <aside class="ig-narrow">
    <div class="ig-narrow-label" data-slot="narrow_label" data-editable="true" contenteditable="true"></div>
    <div class="ig-narrow-icon" data-asset-slot data-asset-type="icon"></div>
    <ol class="ig-narrow-list" data-slot="narrow_items"></ol>
  </aside>
</section>
