<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infogr.ai — Visual Gallery (All Variants)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    :root {
      --accent: #2563EB;
      --accent-soft: rgba(37,99,235,0.1);
      --accent-rgb: 37,99,235;
      --card-bg: #ffffff;
      --card-border: #e5e7eb;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --font-heading: 'Space Grotesk', sans-serif;
      --font-body: 'Plus Jakarta Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f3f4f6;
      color: #111827;
      padding: 20px;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 2em;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      text-align: center;
      color: #6b7280;
      margin-bottom: 30px;
      font-size: 0.95em;
    }

    /* Filter tabs */
    .filter-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-btn {
      padding: 8px 18px;
      border: 1px solid #d1d5db;
      border-radius: 20px;
      background: white;
      cursor: pointer;
      font-size: 0.85em;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #2563EB; color: #2563EB; }
    .filter-btn.active { background: #2563EB; color: white; border-color: #2563EB; }

    /* Family section */
    .family-section {
      margin-bottom: 40px;
    }
    .family-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.3em;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
      padding-left: 4px;
      border-left: 4px solid #2563EB;
      padding-left: 12px;
    }
    .family-subtitle {
      color: #6b7280;
      font-size: 0.85em;
      margin-bottom: 16px;
      padding-left: 16px;
    }

    /* Variant cards grid */
    .variants-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 20px;
    }

    .variant-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .variant-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .variant-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #f3f4f6;
      background: #fafafa;
    }
    .variant-name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.95em;
      color: #111827;
    }
    .variant-meta {
      font-size: 0.75em;
      color: #9ca3af;
    }
    .variant-render {
      padding: 16px;
      min-height: 200px;
      overflow: hidden;
    }
    /* Scale down renders to fit nicely */
    .variant-render .ig-page {
      all: unset;
    }

    /* Item count switcher */
    .item-count-bar {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .item-count-btn {
      width: 28px;
      height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 0.8em;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .item-count-btn:hover { border-color: #2563EB; color: #2563EB; }
    .item-count-btn.active { background: #2563EB; color: white; border-color: #2563EB; }

    /* Grid arrangement switcher */
    .grid-arr-bar {
      display: flex;
      gap: 3px;
      align-items: center;
      flex-wrap: wrap;
    }
    .grid-arr-btn {
      width: 30px;
      height: 22px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3px;
      transition: all 0.15s;
    }
    .grid-arr-btn:hover { border-color: #2563EB; }
    .grid-arr-btn.active { border-color: #2563EB; background: #eff6ff; }
    .grid-arr-btn svg { width: 100%; height: 100%; display: block; }
    .card-controls {
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: flex-end;
    }

    /* Density switcher */
    .density-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .density-btn {
      padding: 6px 14px;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      background: white;
      cursor: pointer;
      font-size: 0.8em;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.15s;
    }
    .density-btn:hover { border-color: #2563EB; color: #2563EB; }
    .density-btn.active { background: #dbeafe; color: #2563EB; border-color: #2563EB; }

    .controls-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .controls-row label {
      font-size: 0.85em;
      font-weight: 600;
      color: #374151;
    }
  </style>
</head>
<body>
  <h1>Infogr.ai Visual Gallery</h1>
  <p class="subtitle">Every layout and diagram variant rendered with sample data. Switch item counts and density to see how they adapt.</p>

  <div class="controls-row">
    <label>Density:</label>
    <div class="density-bar" id="densityBar">
      <button class="density-btn" data-density="compact">Compact</button>
      <button class="density-btn active" data-density="standard">Standard</button>
      <button class="density-btn" data-density="detailed">Detailed</button>
    </div>
    <label>Tone:</label>
    <div class="density-bar" id="toneBar">
      <button class="density-btn active" data-tone="professional">Professional</button>
      <button class="density-btn" data-tone="bold">Bold</button>
      <button class="density-btn" data-tone="minimal">Minimal</button>
      <button class="density-btn" data-tone="playful">Playful</button>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" data-filter="all">All</button>
  </div>

  <div id="gallery"></div>

  <script type="module">
    import { renderSection, BOXES_CSS, BULLETS_CSS, SEQUENCE_CSS, NUMBERS_CSS, CIRCLES_CSS, QUOTES_CSS, STEPS_CSS } from './v3/smart-layouts.js';
    import { renderDiagramSection, DIAGRAM_CSS } from './v3/smart-diagrams.js';
    import { applyLayoutConfig } from './v3/layout-configs.js';
    import { TEMPLATES, renderSlideTemplate, TEMPLATE_CSS } from './v3/slide-templates.js';

    // Inject all CSS into the page (engine + slide template CSS)
    const styleEl = document.createElement('style');
    styleEl.textContent = [
      BOXES_CSS, BULLETS_CSS, SEQUENCE_CSS, NUMBERS_CSS, CIRCLES_CSS, QUOTES_CSS, STEPS_CSS,
      DIAGRAM_CSS,
      TEMPLATE_CSS,
    ].join('\n');
    document.head.appendChild(styleEl);

    // Inject template-preview-specific styles for the gallery
    const tplStyleEl = document.createElement('style');
    tplStyleEl.textContent = `
      /* ── Templates section in the gallery ── */
      .templates-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 16px;
      }
      .template-card {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
        transition: box-shadow 0.2s, transform 0.15s;
      }
      .template-card:hover {
        box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        transform: translateY(-1px);
      }
      .template-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid #f3f4f6;
        background: #fafafa;
      }
      .template-card-id {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 0.82em;
        color: #2563EB;
        letter-spacing: 0.04em;
      }
      .template-card-name {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 600;
        font-size: 0.92em;
        color: #111827;
        flex: 1;
        margin-left: 10px;
      }
      .template-card-cat {
        font-size: 0.7em;
        color: #9ca3af;
        background: #f3f4f6;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Space Grotesk', sans-serif;
      }
      .template-preview-wrap {
        position: relative;
        padding: 12px;
        background: #f9fafb;
        height: 188px;            /* roughly 16:9 of the inner card width */
        overflow: hidden;
      }
      .template-preview-inner {
        position: absolute;
        top: 12px;
        left: 12px;
        width: 960px;
        height: 540px;
        transform: scale(0.29);
        transform-origin: top left;
      }
      /* Make zone boundaries clearer in the preview */
      .template-preview-inner .igs-zone-content {
        outline: 2px dashed rgba(37,99,235,0.25);
        outline-offset: -2px;
      }
      .template-preview-inner .igs-zone-content::before {
        content: attr(data-zone);
        position: absolute;
        top: 12px;
        left: 12px;
        font-size: 16px;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(37,99,235,0.55);
        pointer-events: none;
      }
    `;
    document.head.appendChild(tplStyleEl);

    // ── Sample data generator ──
    const SAMPLE_TITLES = [
      'Strategic Planning', 'Market Analysis', 'Product Launch',
      'Team Building', 'Revenue Growth', 'Customer Success',
      'Data Analytics', 'Innovation Hub', 'Quality Assurance',
      'Global Expansion', 'Risk Management', 'Digital Transform'
    ];
    const SAMPLE_BODIES = [
      'Develop comprehensive strategies that align with organizational goals and drive sustainable growth across all business units.',
      'Analyze market trends, competitor positioning, and customer behavior to identify opportunities and potential threats.',
      'Coordinate cross-functional teams to deliver successful product launches with maximum market impact and adoption.',
      'Foster a collaborative culture that attracts top talent and enables teams to perform at their highest potential.',
      'Implement revenue optimization strategies through pricing, upselling, and market expansion initiatives.',
      'Build lasting customer relationships through proactive engagement, support excellence, and value delivery.',
      'Leverage advanced analytics and machine learning to extract actionable insights from complex data sets.',
      'Create an environment that encourages experimentation, rapid prototyping, and breakthrough innovation.',
      'Establish rigorous quality standards and continuous improvement processes to ensure product excellence.',
      'Navigate international markets with localized strategies, compliance frameworks, and partnership networks.',
      'Identify, assess, and mitigate risks across operations, finance, and strategic initiatives.',
      'Lead digital transformation initiatives that modernize processes, enhance capabilities, and create competitive advantages.'
    ];
    const SAMPLE_ICONS = [
      'rocket', 'chart-increasing', 'target', 'user-group',
      'star', 'shield', 'idea', 'gear',
      'checkmark', 'brain', 'briefcase', 'lightning-bolt'
    ];
    const SAMPLE_NUMBERS = ['87%', '$2.4M', '150+', '99.9%', '3.2x', '45K', '12', '68%', '5★'];

    function makeItems(count) {
      return Array.from({ length: count }, (_, i) => ({
        title: SAMPLE_TITLES[i % SAMPLE_TITLES.length],
        body: SAMPLE_BODIES[i % SAMPLE_BODIES.length],
        icon: SAMPLE_ICONS[i % SAMPLE_ICONS.length],
        number: SAMPLE_NUMBERS[i % SAMPLE_NUMBERS.length],
      }));
    }

    // ── All variants ──
    const FAMILIES = {
      'Boxes (layouts)': {
        type: 'layout',
        variants: [
          'solid-boxes', 'solid-boxes-icons', 'outline-boxes', 'side-line',
          'side-line-text', 'top-line-text', 'top-circle', 'joined-boxes',
          'joined-boxes-icons', 'leaf-boxes', 'labeled-boxes', 'alternating-boxes'
        ],
        defaultItems: 4,
      },
      'Bullets (layouts)': {
        type: 'layout',
        variants: ['large-bullets', 'small-bullets', 'arrow-bullets', 'process-steps', 'solid-box-small-bullets'],
        defaultItems: 4,
      },
      'Sequence (layouts)': {
        type: 'layout',
        variants: ['timeline', 'minimal-timeline', 'minimal-timeline-boxes', 'arrows', 'pills', 'slanted-labels'],
        defaultItems: 4,
      },
      'Numbers (layouts)': {
        type: 'layout',
        variants: ['stats', 'circle-stats', 'bar-stats', 'star-rating', 'dot-grid', 'dot-line', 'circle-bold-line', 'circle-external-line'],
        defaultItems: 4,
      },
      'Circles (layouts)': {
        type: 'layout',
        variants: ['cycle', 'flower', 'circle', 'ring', 'semi-circle'],
        defaultItems: 4,
      },
      'Quotes (layouts)': {
        type: 'layout',
        variants: ['quote-boxes', 'speech-bubbles'],
        defaultItems: 2,
      },
      'Steps (layouts)': {
        type: 'layout',
        variants: ['staircase', 'steps', 'box-steps', 'arrow-steps', 'steps-with-icons', 'pyramid', 'vertical-funnel'],
        defaultItems: 4,
      },
      'Road (diagrams)': {
        type: 'diagram',
        variants: ['road-horizontal', 'road-vertical', 'journey-map', 'experience-map'],
        defaultItems: 4,
      },
      'Target (diagrams)': {
        type: 'diagram',
        variants: ['bullseye', 'radial', 'orbit'],
        defaultItems: 4,
      },
      'Hierarchy (diagrams)': {
        type: 'diagram',
        variants: ['org-chart', 'pyramid-diagram', 'nested-diamonds'],
        defaultItems: 4,
      },
      'Venn (diagrams)': {
        type: 'diagram',
        variants: ['venn-diagram', 'linear-venn', 'linear-venn-filled'],
        defaultItems: 3,
      },
      'Process (diagrams)': {
        type: 'diagram',
        variants: ['infinity-loop'],
        defaultItems: 4,
      },
      'Business (diagrams)': {
        type: 'diagram',
        variants: ['swot', 'competitive-map', 'chain'],
        defaultItems: 4,
      },
    };

    // ── State ──
    let currentDensity = 'standard';
    let currentTone = 'professional';
    let currentFilter = 'all';
    // Per-variant item counts
    const itemCounts = {};
    // Per-variant grid arrangements (null = default columns)
    const gridArrangements = {};

    // ── Grid arrangement thumbnails per item count ──
    // Returns array of { key, svg } objects for the arrangement picker
    const ARRANGEMENTS_FOR_COUNT = {
      2: ['2x1', '1x2'],
      3: ['3x1', '1x3'],
      4: ['4x1', '2x2', '1x4'],
      5: ['2p3', '3p2'],
      6: ['3x2', '2x3'],
      7: ['4x2'],   // closest sensible fit
      8: ['4x2', '2x4'],
    };

    // Generate a tiny SVG icon representing a grid arrangement
    function arrangementSvg(key) {
      const W = 24, H = 16, pad = 1, gap = 1;
      let rects = '';
      function row(x, y, w, h) { rects += `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="1" fill="currentColor"/>`; }
      if (key === '2x1') {
        const hw = (W - pad*2 - gap) / 2;
        row(pad,   pad, hw, H-pad*2);
        row(pad+hw+gap, pad, hw, H-pad*2);
      } else if (key === '1x2') {
        const hh = (H - pad*2 - gap) / 2;
        row(pad, pad,        W-pad*2, hh);
        row(pad, pad+hh+gap, W-pad*2, hh);
      } else if (key === '3x1') {
        const hw = (W - pad*2 - gap*2) / 3;
        for (let i=0;i<3;i++) row(pad+i*(hw+gap), pad, hw, H-pad*2);
      } else if (key === '1x3') {
        const hh = (H - pad*2 - gap*2) / 3;
        for (let i=0;i<3;i++) row(pad, pad+i*(hh+gap), W-pad*2, hh);
      } else if (key === '4x1') {
        const hw = (W - pad*2 - gap*3) / 4;
        for (let i=0;i<4;i++) row(pad+i*(hw+gap), pad, hw, H-pad*2);
      } else if (key === '2x2') {
        const hw = (W - pad*2 - gap) / 2, hh = (H - pad*2 - gap) / 2;
        for (let r=0;r<2;r++) for (let c=0;c<2;c++) row(pad+c*(hw+gap), pad+r*(hh+gap), hw, hh);
      } else if (key === '1x4') {
        const hh = (H - pad*2 - gap*3) / 4;
        for (let i=0;i<4;i++) row(pad, pad+i*(hh+gap), W-pad*2, hh);
      } else if (key === '2p3') {
        // row1: 2 wide, row2: 3 narrower
        const hh = (H - pad*2 - gap) / 2;
        const hw2 = (W - pad*2 - gap) / 2;
        const hw3 = (W - pad*2 - gap*2) / 3;
        row(pad,       pad,        hw2, hh); row(pad+hw2+gap, pad,        hw2, hh);
        for (let i=0;i<3;i++) row(pad+i*(hw3+gap), pad+hh+gap, hw3, hh);
      } else if (key === '3p2') {
        const hh = (H - pad*2 - gap) / 2;
        const hw3 = (W - pad*2 - gap*2) / 3;
        const hw2 = (W - pad*2 - gap) / 2;
        for (let i=0;i<3;i++) row(pad+i*(hw3+gap), pad,        hw3, hh);
        row(pad,       pad+hh+gap, hw2, hh); row(pad+hw2+gap, pad+hh+gap, hw2, hh);
      } else if (key === '3x2') {
        const hw = (W - pad*2 - gap*2) / 3, hh = (H - pad*2 - gap) / 2;
        for (let r=0;r<2;r++) for (let c=0;c<3;c++) row(pad+c*(hw+gap), pad+r*(hh+gap), hw, hh);
      } else if (key === '2x3') {
        const hw = (W - pad*2 - gap) / 2, hh = (H - pad*2 - gap*2) / 3;
        for (let r=0;r<3;r++) for (let c=0;c<2;c++) row(pad+c*(hw+gap), pad+r*(hh+gap), hw, hh);
      } else if (key === '4x2') {
        const hw = (W - pad*2 - gap*3) / 4, hh = (H - pad*2 - gap) / 2;
        for (let r=0;r<2;r++) for (let c=0;c<4;c++) row(pad+c*(hw+gap), pad+r*(hh+gap), hw, hh);
      } else if (key === '2x4') {
        const hw = (W - pad*2 - gap) / 2, hh = (H - pad*2 - gap*3) / 4;
        for (let r=0;r<4;r++) for (let c=0;c<2;c++) row(pad+c*(hw+gap), pad+r*(hh+gap), hw, hh);
      }
      return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">${rects}</svg>`;
    }

    // ── Render a single variant ──
    function renderVariant(variant, familyName, familyInfo) {
      const count = itemCounts[variant] ?? familyInfo.defaultItems;
      const items = makeItems(count);
      const gridArr = gridArrangements[variant] ?? null;
      const section = { variant, items, columns: 3, style: currentDensity, grid: gridArr };

      let html;
      try {
        if (familyInfo.type === 'diagram') {
          html = renderDiagramSection(section, currentTone);
          if (html === null) html = '<p style="color:#ef4444;">Diagram returned null</p>';
        } else {
          html = renderSection(section, currentTone);
        }
      } catch (e) {
        html = `<p style="color:#ef4444;">Error: ${e.message}</p>`;
      }
      return html;
    }

    // ── Templates section builder ──
    // Renders a "Templates" family-section at the top of the gallery showing
    // all 22 page templates. Each card shows the template's zone layout at
    // a readable scale. Templates section appears when filter is 'all' or
    // 'templates'.
    function buildTemplatesSection(gallery) {
      if (currentFilter !== 'all' && currentFilter !== 'templates') return;

      const section = document.createElement('div');
      section.className = 'family-section';
      section.dataset.family = 'Templates';

      const total = Object.keys(TEMPLATES).length;
      section.innerHTML = `
        <h2 class="family-title">Templates (page layouts)</h2>
        <p class="family-subtitle">${total} page templates · zone layouts for slide deck mode</p>
        <div class="templates-grid" id="grid-Templates"></div>
      `;
      gallery.appendChild(section);

      const grid = section.querySelector('.templates-grid');
      // Group by category for stable visual order: A → B → C → D → E
      const sortedTpls = Object.values(TEMPLATES).sort((a, b) => {
        if (a.category !== b.category) return a.category.localeCompare(b.category);
        return a.id.localeCompare(b.id);
      });

      for (const tpl of sortedTpls) {
        const card = document.createElement('div');
        card.className = 'template-card';
        card.dataset.tplId = tpl.id;
        card.innerHTML = `
          <div class="template-card-header">
            <span class="template-card-id">${tpl.id}</span>
            <span class="template-card-name">${tpl.name}</span>
            <span class="template-card-cat">Cat ${tpl.category}</span>
          </div>
          <div class="template-preview-wrap">
            <div class="template-preview-inner">
              ${renderSlideTemplate(tpl.id)}
            </div>
          </div>
        `;
        grid.appendChild(card);
      }
    }

    // ── Build the gallery ──
    function buildGallery() {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      // Templates section appears first
      buildTemplatesSection(gallery);

      // Skip the diagram families when filter is 'templates'
      if (currentFilter === 'templates') return;

      for (const [familyName, familyInfo] of Object.entries(FAMILIES)) {
        // Filter check
        if (currentFilter !== 'all') {
          if (currentFilter === 'layouts' && familyInfo.type !== 'layout') continue;
          if (currentFilter === 'diagrams' && familyInfo.type !== 'diagram') continue;
          if (currentFilter !== 'layouts' && currentFilter !== 'diagrams' && !familyName.toLowerCase().includes(currentFilter)) continue;
        }

        const section = document.createElement('div');
        section.className = 'family-section';
        section.dataset.family = familyName;

        const variantCount = familyInfo.variants.length;
        section.innerHTML = `
          <h2 class="family-title">${familyName}</h2>
          <p class="family-subtitle">${variantCount} variant${variantCount > 1 ? 's' : ''} · ${familyInfo.type}</p>
          <div class="variants-grid" id="grid-${familyName.replace(/\s+/g, '-')}"></div>
        `;
        gallery.appendChild(section);

        const grid = section.querySelector('.variants-grid');

        for (const variant of familyInfo.variants) {
          const count = itemCounts[variant] ?? familyInfo.defaultItems;
          const card = document.createElement('div');
          card.className = 'variant-card';
          card.dataset.variant = variant;

          // Item count buttons (2-8)
          let countBtns = '';
          for (let n = 2; n <= 8; n++) {
            const active = n === count ? ' active' : '';
            countBtns += `<button class="item-count-btn${active}" data-n="${n}" data-variant="${variant}" data-family="${familyName}">${n}</button>`;
          }

          // Grid arrangement buttons for this item count
          const arrangements = ARRANGEMENTS_FOR_COUNT[count] || [];
          const currentArr = gridArrangements[variant] ?? null;
          let arrBtns = '';
          if (arrangements.length > 0) {
            arrBtns = arrangements.map(key => {
              const active = key === currentArr ? ' active' : '';
              return `<button class="grid-arr-btn${active}" title="${key}" data-arr="${key}" data-variant="${variant}" data-family="${familyName}">${arrangementSvg(key)}</button>`;
            }).join('');
          }

          card.innerHTML = `
            <div class="variant-card-header">
              <span class="variant-name">${variant}</span>
              <div class="card-controls">
                <div class="item-count-bar">
                  <span class="variant-meta">Items:</span>
                  ${countBtns}
                </div>
                ${arrBtns ? `<div class="grid-arr-bar"><span class="variant-meta">Grid:</span>${arrBtns}</div>` : ''}
              </div>
            </div>
            <div class="variant-render ig-page" data-variant="${variant}" data-family="${familyName}">
              ${renderVariant(variant, familyName, familyInfo)}
            </div>
          `;
          grid.appendChild(card);

          // Apply saved layout config overrides from layout-configs.js
          const renderContainer = card.querySelector('.variant-render');
          if (renderContainer) {
            applyLayoutConfig(renderContainer, variant, count);
          }
        }
      }

      // Attach item count click handlers
      document.querySelectorAll('.item-count-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const variant = e.target.dataset.variant;
          const familyName = e.target.dataset.family;
          const n = parseInt(e.target.dataset.n);
          itemCounts[variant] = n;
          // Reset arrangement when count changes (arrangements differ per count)
          gridArrangements[variant] = null;

          // Update active state on count buttons
          const card = e.target.closest('.variant-card');
          card.querySelectorAll('.item-count-btn').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');

          // Refresh arrangement buttons for new count
          const familyInfo = FAMILIES[familyName];
          const newArrangements = ARRANGEMENTS_FOR_COUNT[n] || [];
          const arrBar = card.querySelector('.grid-arr-bar');
          if (arrBar) {
            if (newArrangements.length > 0) {
              const newArrBtns = newArrangements.map(key =>
                `<button class="grid-arr-btn" title="${key}" data-arr="${key}" data-variant="${variant}" data-family="${familyName}">${arrangementSvg(key)}</button>`
              ).join('');
              arrBar.innerHTML = `<span class="variant-meta">Grid:</span>${newArrBtns}`;
              arrBar.querySelectorAll('.grid-arr-btn').forEach(b => b.addEventListener('click', arrClickHandler));
            } else {
              arrBar.innerHTML = '';
            }
          }

          // Re-render just this variant
          const renderDiv = card.querySelector('.variant-render');
          renderDiv.innerHTML = renderVariant(variant, familyName, familyInfo);
          // Apply saved layout config overrides
          applyLayoutConfig(renderDiv, variant, n);
        });
      });

      // Grid arrangement click handler (defined as named function for reuse)
      function arrClickHandler(e) {
        const variant = e.currentTarget.dataset.variant;
        const familyName = e.currentTarget.dataset.family;
        const arr = e.currentTarget.dataset.arr;

        // Toggle: clicking active arrangement deselects it
        if (gridArrangements[variant] === arr) {
          gridArrangements[variant] = null;
          e.currentTarget.classList.remove('active');
        } else {
          gridArrangements[variant] = arr;
          const card = e.currentTarget.closest('.variant-card');
          card.querySelectorAll('.grid-arr-btn').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
        }

        const card = e.currentTarget.closest('.variant-card');
        const renderDiv = card.querySelector('.variant-render');
        const familyInfo = FAMILIES[familyName];
        renderDiv.innerHTML = renderVariant(variant, familyName, familyInfo);
        // Apply saved layout config overrides
        const count = itemCounts[variant] ?? familyInfo.defaultItems;
        applyLayoutConfig(renderDiv, variant, count);
      }

      // Attach arrangement handlers to initially-built buttons
      document.querySelectorAll('.grid-arr-btn').forEach(btn => {
        btn.addEventListener('click', arrClickHandler);
      });
    }

    // ── Filter bar ──
    const filterBar = document.getElementById('filterBar');
    const filters = ['all', 'templates', 'layouts', 'diagrams',
      'boxes', 'bullets', 'sequence', 'numbers', 'circles', 'quotes', 'steps',
      'road', 'target', 'hierarchy', 'venn', 'process', 'business'];
    filters.forEach(f => {
      if (f === 'all') return; // already exists
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = f;
      btn.textContent = f.charAt(0).toUpperCase() + f.slice(1);
      filterBar.appendChild(btn);
    });

    filterBar.addEventListener('click', (e) => {
      if (!e.target.classList.contains('filter-btn')) return;
      currentFilter = e.target.dataset.filter;
      filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      buildGallery();
    });

    // ── Density bar ──
    document.getElementById('densityBar').addEventListener('click', (e) => {
      if (!e.target.classList.contains('density-btn')) return;
      currentDensity = e.target.dataset.density;
      document.querySelectorAll('#densityBar .density-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      buildGallery();
    });

    // ── Tone bar ──
    document.getElementById('toneBar').addEventListener('click', (e) => {
      if (!e.target.classList.contains('density-btn')) return;
      currentTone = e.target.dataset.tone;
      document.querySelectorAll('#toneBar .density-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      buildGallery();
    });

    // ── Initial render ──
    buildGallery();

    console.log('Gallery loaded. Total variants:',
      Object.values(FAMILIES).reduce((sum, f) => sum + f.variants.length, 0));
  </script>
</body>
</html>
